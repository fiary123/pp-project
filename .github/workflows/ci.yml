name: CI

on:
  push:
    branches: ["main", "review-sync"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest ruff

      - name: Lint (ruff)
        run: ruff check src/ tests/ --select E,F,W --ignore E501

      - name: Run tests
        env:
          # CI 环境注入测试用密钥，避免 fail-fast 阻断测试
          JWT_SECRET_KEY: "ci-test-secret-key-do-not-use-in-production"
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          DEEPSEEK_API_KEY: "ci-placeholder"
        run: pytest tests/test_security.py tests/test_ai_audit.py -v --tb=short

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pet-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pet-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (vite)
        run: npm run build
