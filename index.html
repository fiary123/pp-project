
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 宠物领养助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f7f3ed; padding: 20px; }
        .chat-container { max-width: 700px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
        .header { background-color: #ff9800; color: white; padding: 15px; text-align: center; font-size: 1.2em; font-weight: bold; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; background: #faf9f7; }
        .msg-wrapper { display: flex; margin-bottom: 20px; flex-direction: column; }
        .msg-wrapper.user { align-items: flex-end; }
        .msg-wrapper.ai { align-items: flex-start; }
        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; white-space: pre-wrap; }
        .user .msg-bubble { background-color: #ffcc80; color: #333; border-bottom-right-radius: 2px; }
        .ai .msg-bubble { background-color: white; color: #333; border: 1px solid #eee; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; background: white; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1em; }
        button { padding: 12px 25px; background-color: #ff9800; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #e68a00; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="app" class="chat-container">
        <div class="header">🐱 智能宠物顾问</div>
        
        <div class="chat-box" id="chatWindow">
            <div v-for="(msg, index) in messages" :key="index" :class="['msg-wrapper', msg.role]">
                <div style="font-size: 0.8em; color: #888; margin-bottom: 5px; padding: 0 5px;">
                    {{ msg.role === 'user' ? '你' : 'AI 顾问团队' }}
                </div>
                <div class="msg-bubble">{{ msg.content }}</div>
            </div>
            
            <div v-if="isLoading" class="msg-wrapper ai">
                <div class="msg-bubble" style="color: #ff9800; font-style: italic;">专家团队正在后台开会分析...</div>
            </div>
        </div>

        <div class="input-area">
            <input v-model="userInput" @keyup.enter="sendMessage" :disabled="isLoading" placeholder="例如：我住单身公寓，想找一只安静的猫..." />
            <button @click="sendMessage" :disabled="isLoading || !userInput.trim()">发送请求</button>
        </div>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue

        createApp({
            setup() {
                const userInput = ref('')
                const isLoading = ref(false)
                const messages = ref([
                    { role: 'ai', content: '你好！我是由多位智能体专家组成的宠物领养顾问团队。请问你想寻找怎样的毛孩子？或者有什么宠物健康问题？' }
                ])

                const scrollToBottom = async () => {
                    await nextTick()
                    const container = document.getElementById('chatWindow')
                    container.scrollTop = container.scrollHeight
                }

                const sendMessage = async () => {
                    if (!userInput.value.trim() || isLoading.value) return
                    
                    const text = userInput.value
                    messages.value.push({ role: 'user', content: text })
                    userInput.value = ''
                    isLoading.value = true
                    scrollToBottom()

                    try {
                        const response = await fetch('http://127.0.0.1:8000/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: text })
                        })
                        const data = await response.json()
                        messages.value.push({ role: 'ai', content: data.reply })
                    } catch (error) {
                        messages.value.push({ role: 'ai', content: '❌ 网络断开，请确认后端 API 服务已启动！' })
                    } finally {
                        isLoading.value = false
                        scrollToBottom()
                    }
                }

                return { userInput, messages, isLoading, sendMessage }
            }
        }).mount('#app')
    </script>
</body>
</html>
